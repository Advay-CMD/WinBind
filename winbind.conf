# WinBind Configuration

# Startup Apps
# Start once your PC boots up
Startup = 
[
    "notepad.exe"
]

# --------------------- Key Binder Configuration ---------------------
# Format: MODIFIERS+KEY = ACTION [ARG]
# Modifiers: WIN, CTRL, ALT, SHIFT (combine with +)
# Actions: SWITCH <N>   - Switch to virtual desktop N
#          MOVE <N>     - Move foreground window to desktop N
#          MOVE_SWITCH <N> - Move window AND switch to desktop N
#          SIMULATE_KEY[MODIFIERS+KEY] - Simulate keys
#          RUN["app path", "arguments"] - Allows you to run an app using
#                                         a shortcut with custom args
# Comments start with #

# [!] WARNING > If you DON'T KNOW HOW to modify, PLEASE learn
#               from the documentation over <link>. Please don't
#               use common, already system assigned shortcuts like
#               Ctrl + V, as this will override Ctrl + V and make
#               Ctrl + V unworkable.
#               Note: This program will automatically detect conflicts
#                     so, the bad overrides will be ignored. IF YOU
#                     REALLY WANT TO OVERRIDE, ENABLE Allow_Bad_Keys

# Blocked by default: CTRL+C/X/V/Z/Y/A/S/O/P/F/H/N/W/T, ALT+F4/TAB/ESC/SPACE/ENTER,
#                     WIN+D/E/I/L/R/V/TAB/SPACE/PAUSE/A/B/G/H/K/M/O/P/S/T/U/W/X/Z
#                     WIN+LEFT/RIGHT/UP/DOWN, WIN+SHIFT+S, CTRL+ALT+DEL, CTRL+SHIFT+ESC

# ⚠ WIN+ALT+NUMBER and WIN+SHIFT+NUMBER are SYSTEM taskbar shortcuts (jump list / new instance).
#   They cannot be intercepted by any user-mode hook on Windows 11.
#   Use WIN+CTRL+NUMBER or non-letter WIN+SHIFT combos instead(except the one given for move_switch).

# Not Recommended to mess up with
Allow_Bad_Keys=Disabled

# Enable the Mod
Virtual_Desktop_Switch=Enabled
# Enable New Desktop to be created, the virtual desktop doesn't exist
New_Desktop_Creation=Enabled
# Auto-remove virtual desktops that have no application windows
Auto_Remove_Virtual_Desktop=Enabled

# Default: WIN+1..9 to switch virtual desktops
WIN+1 = SWITCH 1
WIN+2 = SWITCH 2
WIN+3 = SWITCH 3
WIN+4 = SWITCH 4
WIN+5 = SWITCH 5
WIN+6 = SWITCH 6
WIN+7 = SWITCH 7
WIN+8 = SWITCH 8
WIN+9 = SWITCH 9

# Enable the Mod
Window_And_Virtual_Desktop_Switch=Enabled

# Move window to desktop then switch
WIN+SHIFT+1 = MOVE_SWITCH 1
WIN+SHIFT+2 = MOVE_SWITCH 2
WIN+SHIFT+3 = MOVE_SWITCH 3
WIN+SHIFT+4 = MOVE_SWITCH 4
WIN+SHIFT+5 = MOVE_SWITCH 5
WIN+SHIFT+6 = MOVE_SWITCH 6
WIN+SHIFT+7 = MOVE_SWITCH 7
WIN+SHIFT+8 = MOVE_SWITCH 8
WIN+SHIFT+9 = MOVE_SWITCH 9

# Make custom key simulations by shortcuts
CTRL+SHIFT+C = SIMULATE_KEY[CTRL+C]

# Make custom key shortcuts for apps
CTRL+SHIFT+P = RUN("C:\Users\advay\AppData\Local\Programs\Microsoft VS Code\code.exe", "")
CTRL+SHIFT+L = RUN("powershell.exe", -Command "Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.Application]::SetSuspendState('Suspend', $false, $true)")
CTRL+SHIFT+Q = LoadConf["winbind copy.conf"]

# -------------------- Transparency Configuration --------------------
# Actions: Transparency = Enable/Disable
#          Transparency_Delay = Time_Delay(preferably in s)
#          Opacity = Percent_Value(include %)
# Comments start with #

# [!] WARNING > If you DON'T KNOW HOW to modify, PLEASE learn
#               from the documentation over <link>.

# Enable the Transparency program
Transparency = Enabled

# Delay time
# Higher the value, higher your CPU/RAM usage will be
Transparency_Delay = 1s

# Set the Opacity
Opacity = 87%

# Excluded Apps
# "*" - To exclude all apps "appname.exe" - to exclude the app.
# Use commas for more.
TransparencyExclusion = ["explorer.exe","ShellHost.exe","LockScreen.exe","StartMenuExperienceHost.exe","SearchHost.exe","SearchApp.exe","TextInputHost.exe","Widgets.exe","ApplicationFrameHost.exe","dwm.exe"]

# -------------------- Window Styler Configuration --------------------
# Make windows look better - better than your default
# Actions: StealFocus = Enabled/Disabled (hover = auto-focus, like Linux)
#          ChangeBorderColor = [R,G,B]  (0-255 each, e.g. [255,0,0] = red)
#          ChangeTitleBarColor = [R,G,B] (0-255 each)
#          DarkModeTitleBar = Enabled/Disabled
#          SystemBackdrop = 1/2/3/4  (1=Auto, 2=None, 3=Mica, 4=Acrylic)
#          WindowStyler_Delay = Time (e.g. 2s, 1000ms, 3000)
# Comments start with #

# [!] WARNING > Not all windows respect DWM attributes.
#               Some apps (Chrome, games) draw their own title bars.
#               If it don't work, it's them, not us.
#               If you DON'T KNOW HOW to modify, PLEASE learn
#               from the documentation over <link>.

# Hover over a window and it steals focus - rather than clicking
StealFocus = Enabled

# Border color
ChangeBorderColor = [0,100,255]

# Excluded Apps
# "*" - To exclude all apps "appname.exe" - to exclude the app.
# Use commas for more.
ChangeBorderColorExclusion = []

# Title bar color
# ChangeTitleBarColor = [50,50,50]

# Excluded Apps
# "*" - To exclude all apps "appname.exe" - to exclude the app.
# Use commas for more.
# ChangeTitleBarColorExclusion = []

# Dark mode title bars
DarkModeTitleBar = Enabled

# Excluded Apps
# "*" - To exclude all apps "appname.exe" - to exclude the app.
# Use commas for more.
ChangeDarkModeTitleBarExclusion = []

# System backdrop effect
# 1 = Auto (let Windows decide), 2 = None, 3 = Mica, 4 = Acrylic
SystemBackdrop = 3

# Excluded Apps
# "*" - To exclude all apps "appname.exe" - to exclude the app.
# Use commas for more.
SystemBackdropExclusion = []

# How often we restyle (in ms or s). Lower = snappier but hungrier
WindowStyler_Delay = 500ms
