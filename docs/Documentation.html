                really know what you are doing.
            </p>
            <h3>Blocked System Shortcuts</h3>
            <p>
                The following shortcuts are blocked by default to prevent OS conflicts:
            </p>
            <pre><code>CTRL+C/X/V/Z/Y/A/S/O/P/F/H/N/W/T
ALT+F4/TAB/ESC/SPACE/ENTER
WIN+D/E/I/L/R/V/TAB/SPACE/PAUSE
WIN+A/B/G/H/K/M/O/P/S/T/U/W/X/Z
WIN+LEFT/RIGHT/UP/DOWN
WIN+SHIFT+S
CTRL+ALT+DEL
CTRL+SHIFT+ESC</code></pre>

            <pre><code>Format: MODIFIERS+KEY = ACTION [ARG]
Modifiers: WIN, CTRL, ALT, SHIFT (combine with +)

Actions:
  SWITCH &lt;N&gt;          - Switch to virtual desktop N

  MOVE_SWITCH &lt;N&gt;     - Move window AND switch to desktop N
  SIMULATE_KEY[MODIFIERS+KEY] - Simulate keys
  RUN["app", "args"]  - Launch an application</code></pre>

WIN+2 = SWITCH 2

            <h1>Project Overview</h1>
            <p>
                WinBind is a <strong>Windows utility</strong> that runs in the

        'dev-arch': `
            <h1>Architecture</h1>
            <p>WinBind is built around a small core with these layers:</p>
            <ul>
                <li><strong>Event Source Layer</strong> — captures raw OS events via a low-level keyboard hook</li>
                <li><strong>Binding Layer</strong> — matches events to registered bindings</li>
                <li><strong>Action Layer</strong> — dispatches commands to handlers (desktop switch, key simulation, etc.)</li>
            </ul>
            <p>
                The program uses a <strong>hidden window</strong> and a
                <strong>message loop</strong> to process actions outside the hook
                callback (since <code>SendInput</code> cannot be called from within
                a hook).
            </p>
        `,

            <h1>File Structure</h1>

        'dev-entrypoint': `
            <h1>Entry Point — How WinBind Starts</h1>
            <p><strong>File:</strong> <code>main.cpp</code> — Function: <code>WinMain</code></p>
            <p>Every Windows program starts at <code>WinMain</code>. Here is the flow:</p>
            <pre><code>int WINAPI WinMain(HINSTANCE hInst, ...) {
    // 1. Get the singleton Keybinder
    Keybinder& kb = Keybinder::Instance();

    // 2. Check for --config flag, load config
    kb.LoadConfig(configPath);

    // 3. Create a hidden window (mailbox for messages)
    HWND hWnd = CreateWindowExW(..., HWND_MESSAGE, ...);
    kb.SetWindowHandle(hWnd);

    // 4. Start keyboard hook and COM
    if (!kb.Init()) return 1;

    // 5. Start transparency timer
    SetTimer(hWnd, TIMER_TRANSPARENCY, delayMs, NULL);

    // 6. Message loop — runs forever
    MSG msg;
    while (GetMessage(&msg, NULL, 0, 0)) {
        TranslateMessage(&msg);
        DispatchMessage(&msg);
    }

    // 7. Clean up
    kb.Stop();
    return 0;
}</code></pre>
            <h2>The Hidden Window & Message Loop</h2>
            <p>
                The hidden window (<code>HWND_MESSAGE</code>) never appears on screen.
                It receives:
            </p>
            <ul>
                <li><strong>WM_KB_EXECUTE</strong> — when a keybind matches, the hook posts this message</li>
                <li><strong>WM_TIMER</strong> — timer tick for transparency</li>
            </ul>
        `,

        'dev-hook': `
            <h1>Keyboard Hook</h1>
            <p><strong>File:</strong> <code>keybinder.cpp</code> — <code>KeyboardProc</code></p>
            <p>
                A low-level keyboard hook (<code>WH_KEYBOARD_LL</code>) fires for
                <strong>every keystroke</strong> on the entire system.
            </p>
            <pre><code>LRESULT CALLBACK Keybinder::KeyboardProc(int nCode, WPARAM wParam, LPARAM lParam) {
    if (nCode == HC_ACTION && Instance().HandleKeyEvent(wParam, lParam) == 1)
        return 1;  // Block the key
    return CallNextHookEx(NULL, nCode, wParam, lParam);  // Let it through
}</code></pre>
            <h2>HandleKeyEvent Logic</h2>
            <ol>
                <li><strong>Track modifier keys</strong> (Win, Ctrl, Alt, Shift) — update bitmask</li>
                <li><strong>Check m_busy</strong> — block real keys while action is running</li>
                <li><strong>Check m_simulating</strong> — skip injected keys to prevent loops</li>
                <li><strong>Check config changes</strong> — reload if file was modified</li>
                <li><strong>Match bindings</strong> — if key+modifiers match, post execute message and block key</li>
            </ol>
        `,

        'dev-config': `
            <h1>Config Loading</h1>
            <p><strong>File:</strong> <code>keybinder.cpp</code> — <code>LoadConfig</code></p>
            <p>The config file (<code>winbind.conf</code>) is parsed line by line.</p>
            <h2>Format</h2>
            <pre><code># Comments start with #
FLAG_NAME = Enabled/Disabled
MODIFIERS+KEY = ACTION [ARGUMENT]</code></pre>
            <h2>Parsing Steps</h2>
            <ol>
                <li>Trim whitespace, skip blanks and comments</li>
                <li>Split on <code>=</code> to get left-hand side and right-hand side</li>
                <li>If LHS is a known flag name → set boolean flag</li>
                <li>Otherwise parse as a keybinding: split LHS on <code>+</code> for modifiers + key, parse RHS for action + argument</li>
            </ol>
            <h3>Key Name Resolution</h3>
            <p><code>KeyNameToVK</code> converts string names to Windows virtual-key codes:</p>
            <pre><code>"A" → 0x41, "5" → 0x35
"F1" → VK_F1, "LEFT" → VK_LEFT
"SPACE" → VK_SPACE, "ENTER" → VK_RETURN</code></pre>
            <h3>System Shortcut Blocklist</h3>
            <p>
                <code>IsSystemShortcut</code> checks ~40 dangerous combos. If a match
                is found, the binding is rejected unless <code>Allow_Bad_Keys = Enabled</code>.
            </p>
        `,

        'dev-actions': `
            <h1>Actions</h1>
            <p><strong>File:</strong> <code>keybinder.cpp</code> — <code>ExecuteAction</code></p>
            <p>When a keybind matches, the action is dispatched:</p>
            <pre><code>void Keybinder::ExecuteAction(const Keybinding& kb) {
    if (kb.action == "SWITCH") {
        SwitchToDesktop(kb.arg);
    }
    else if (kb.action == "MOVE") {
        MoveCurrentWindowToDesktop(kb.arg);
    }
    else if (kb.action == "MOVE_SWITCH") {
        // Move window AND switch
    }
    else if (kb.action == "SIMULATE_KEY") {
        SimulateKeyCombo(kb.targetMods, kb.targetVk);
    }
    else if (kb.action == "RUN") {
        ShellExecuteA(NULL, "open", kb.runApp.c_str(),
            kb.runArgs.c_str(), NULL, SW_SHOWNORMAL);
    }
}</code></pre>
            <h2>Action Reference</h2>
            <table>
                <tr><th>Action</th><th>Parameters</th><th>What It Does</th></tr>

                <tr><td><code>RUN</code></td><td><code>("app", "args")</code></td><td>Launches an application</td></tr>

        'dev-desktop': `
            <h1>Desktop Switching</h1>
            <p><strong>File:</strong> <code>keybinder.cpp</code> — <code>SwitchToDesktop</code></p>
            <p>
                Windows has no official "switch to desktop N" API. WinBind simulates
                keyboard shortcuts to navigate desktops:
            </p>
            <ul>
                <li><kbd>Win+Ctrl+Left</kbd> — previous desktop</li>
                <li><kbd>Win+Ctrl+Right</kbd> — next desktop</li>
                <li><kbd>Win+Ctrl+D</kbd> — create new desktop</li>
            </ul>
            <p>
                To go from desktop 2 to desktop 5, WinBind presses
                <kbd>Win+Ctrl+Right</kbd> three times.
            </p>

            <h2>Moving Windows</h2>
            <p>
                <code>MoveCurrentWindowToDesktop</code> tries <strong>3 methods</strong>:
            </p>
            <ol>
                <li><strong>Undocumented COM service</strong> — no screen flicker (preferred)</li>
                <li><strong>Public COM API</strong> — <code>IVirtualDesktopManager::MoveWindowToDesktop</code></li>
                <li><strong>Keyboard shortcut fallback</strong> — <kbd>Win+Shift+Left/Right</kbd></li>
            </ol>

            <h2>Removing Empty Desktops</h2>
            <p>
                Instead of switching to each desktop (which flickers the screen),
                WinBind uses <code>EnumWindows</code> + COM to check which desktops
                have windows, then deletes the empty ones.
            </p>
        `,

        'dev-transparency': `
            <h1>Transparency Code</h1>
            <p><strong>Files:</strong> <code>Transparency.cpp</code>, <code>Transparency.h</code></p>
            <p>Transparency is applied using the Windows layered window API:</p>
            <pre><code>void SetWindowTransparency(HWND hwnd, int percentage_opacity) {
    // Make the window "layered"
    SetWindowLongPtr(hwnd, GWL_EXSTYLE,
        GetWindowLongPtr(hwnd, GWL_EXSTYLE) | WS_EX_LAYERED);

    // Set opacity: 0 = fully transparent, 255 = fully opaque
    SetLayeredWindowAttributes(hwnd, 0,
        (BYTE)(255 * percentage_opacity / 100), LWA_ALPHA);
}</code></pre>
            <p>
                An <code>EnumWindows</code> callback applies this to every visible
                window with a title, excluding system windows.
            </p>
            <p>
                The timer fires every <code>Transparency_Delay</code> milliseconds
                (default 1000ms). On each tick, it re-reads the config and reapplies
                — so you can change opacity without restarting.
            </p>
        `,

        'dev-simulation': `
            <h1>Key Simulation (SendInput)</h1>
            <p><strong>File:</strong> <code>keybinder.cpp</code> — <code>SimulateKeyCombo</code></p>
            <p>
                WinBind uses <code>SendInput</code> to inject keystrokes. There are
                two overloads:
            </p>
            <h2>Three-Parameter (WIN+CTRL+D, WIN+CTRL+ARROW)</h2>
            <pre><code>void SimulateKeyCombo(WORD mod1, WORD mod2, WORD key);</code></pre>
            <p>
                Checks if the user is already holding each modifier — if so, skips it.
                Prevents <kbd>Win+Win</kbd> from sending nothing.
            </p>
            <h2>Two-Parameter (SIMULATE_KEY)</h2>
            <pre><code>void SimulateKeyCombo(DWORD mods, DWORD vk);</code></pre>
            <p>
                Releases modifiers the user holds that the target doesn't need,
                presses missing modifiers, then restores the original state.
            </p>
            <h2>The m_simulating Guard</h2>
            <p>
                After <code>SendInput</code>, the code pumps messages for ~20ms with
                <code>m_simulating = true</code>. This prevents injected keys from
                triggering bindings and causing infinite loops.
            </p>
        `,

        'dev-com': `
            <h1>COM & The SIGSEGV Guard</h1>
            <p>
                WinBind uses COM to talk to Windows' virtual desktop manager. Since some
                interfaces are <strong>undocumented</strong> and change between Windows
                versions, it uses a SIGSEGV signal handler to catch crashes.
            </p>
            <h2>The SIGSEGV Guard</h2>
            <pre><code>static jmp_buf g_comJmpBuf;

extern "C" void __cdecl SigSegvHandler(int) {
    longjmp(g_comJmpBuf, 1);  // Jump back to safety
}</code></pre>
            <p>Usage pattern — try multiple COM interface IDs:</p>
            <pre><code>signal(SIGSEGV, SigSegvHandler);
if (setjmp(g_comJmpBuf) == 0) {
    // Try COM call — if it crashes, longjmp back
} else {
    // Crash caught, try next approach
}
signal(SIGSEGV, oldHandler);</code></pre>
            <p>
                This lets WinBind try <strong>5 different interface IDs</strong> for
                <code>IVirtualDesktopManagerInternal</code> across Windows versions.
            </p>

            <h2>The ComPtr Template</h2>
            <pre><code>template&lt;typename T&gt;
class ComPtr {
    T* p;
public:
    ~ComPtr() { if (p) p->Release(); }  // Auto-release
    T** operator&() { return &p; }
    T* operator->() { return p; }
};</code></pre>
            <p>
                RAII wrapper for COM objects. Currently underused in the codebase —
                most COM calls still use raw pointers.
            </p>
        `,

        'dev-pitfalls': `
            <h1>Common Pitfalls</h1>

            <h3>WIN+ALT+NUMBER doesn't work</h3>
            <p>
                Windows 11 reserves <kbd>Win+Alt+Number</kbd> (taskbar jump lists)
                and <kbd>Win+Shift+Number</kbd> (new instance). No user-mode hook
                can intercept these. Use <kbd>Win+Ctrl+Number</kbd> instead.
            </p>

            <h3>Config changes don't take effect</h3>
            <p>
                <code>CheckConfigChanged</code> compares file timestamps. Some editors
                (like Notepad) create a new file on save, which changes the timestamp.
                Save the file again after WinBind starts.
            </p>

            <h3>Simulated keys don't reach the app</h3>
            <p>
                Some apps (games, terminals) use <code>GetAsyncKeyState</code> or raw
                input instead of the message queue. <code>SendInput</code> won't reach
                them. There is no universal fix.
            </p>

            <h3>Crash on COM calls</h3>
            <p>
                The undocumented <code>IVirtualDesktopManagerInternal</code> changes
                with every Windows update. If a new IID is needed, add it to the
                <code>pairs[]</code> array in <code>TryMoveWindowViaService</code>.
            </p>

            <h3>SendInput doesn't work inside the hook</h3>
            <p>
                Windows restricts <code>SendInput</code> inside low-level hook
                callbacks. WinBind works around this by posting a message to the
                hidden window and executing actions in the message loop.
            </p>

            <h3>Infinite loop (binding triggers itself)</h3>
            <p>
                Don't bind a key to simulate itself (e.g.
                <code>WIN+1 = SIMULATE_KEY[WIN+1]</code>). The
                <code>m_simulating</code> guard prevents loops during the 20ms
                pump window, but timing issues can still occur.
            </p>
        `,
    };

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        let html = '';
        for (const section of SIDEBAR) {
            html += '<div class="sidebar-section">';
            html += `<div class="sidebar-section-title" onclick="toggleSection(this)">
                ${section.title} <span class="arrow open">&#9654;</span>
            </div>`;
            html += '<div class="sidebar-items">';
            for (const item of section.items) {
                const icon = item.icon ? `<i class="ph-bold ph-${item.icon}"></i>` : '';
                html += `<div class="sidebar-item" data-id="${item.id}" onclick="navigate('${item.id}')">
                    ${icon} ${item.label}
                </div>`;
                if (item.subitems) {
                    for (const sub of item.subitems) {
                        html += `<div class="sidebar-subitem" data-id="${sub.id}" onclick="navigate('${sub.id}')">
                            ${sub.label}
                        </div>`;
                    }
                }
            }
            html += '</div></div>';
        }
        sidebar.innerHTML = html;
        document.querySelectorAll('.sidebar-section-title .arrow').forEach(a => a.classList.add('open'));
    }

    function toggleSection(el) {
        const arrow = el.querySelector('.arrow');
        const items = el.nextElementSibling;
        const isOpen = arrow.classList.contains('open');
        if (isOpen) {
            arrow.classList.remove('open');
            items.style.maxHeight = '0';
            items.style.opacity = '0';
        } else {
            arrow.classList.add('open');
            items.style.maxHeight = items.scrollHeight + 'px';
            items.style.opacity = '1';
        }
    }

    function navigate(id) {
        document.querySelectorAll('.sidebar-item, .sidebar-subitem').forEach(el => el.classList.remove('active'));
        const activeEl = document.querySelector(`[data-id="${id}"]`);
        if (activeEl) activeEl.classList.add('active');

        const container = document.getElementById('docContent');
        const content = CONTENT[id];
        if (content) {
            container.innerHTML = content;
        } else {
            container.innerHTML = `<h1>${id}</h1><p>Content coming soon.</p>`;
        }
        container.scrollTop = 0;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderSidebar();
    navigate('welcome');
    </script>
