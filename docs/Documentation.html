        'editing-config': `
            <h1>Editing Configuration file the right way</h1>
            <p>Most of the people will not even know there was a *.config* file 🤣.

            It resides in:<br>
            <code>TODO -> path</code></p>

            <h2>With great power comes great responsibility</h2>

            <br><br>

            <br><br>
            <code>Allow_Bad_Keys=Disabled</code>

            <br>

            It is a exaustive list, but it is to prevent the user from messing up with the Operating System</p>

            <br><br>
            It is already written in the *.conf* what has to be done, example for the KeyBind <em>configuration</em>, it is given like this:<br><br>
            <code>
Format: MODIFIERS+KEY = ACTION [ARG]
Modifiers: WIN, CTRL, ALT, SHIFT (combine with +)<br>
Actions: SWITCH &lt;N&gt;   - Switch to virtual desktop N<br>
          MOVE &lt;N&gt;     - Move foreground window to desktop N<br>
          MOVE_SWITCH &lt;N&gt; - Move window AND switch to desktop N<br>
Comments start with #
            </code>
            <br><br>
            This will be written in the *.conf*, but don't worry, if you have questions/doubts, I am also going to explain in EACH section wether it be Control/Personlization, I am going to guide you to make the *.conf* program.</p>

        'making-keybinds': `
            <h1>Making your OWN custom keybind</h1>
            <p>I am 99% sure that you would now like to make your own keybinds, probably with thoughts in your head what to make! I am going to guide you step by step to edit the <em>winbind.conf</em> for creating keybinds.</p>

            <h2>Learning the pre-existing functions</h2>
            <pre><code>Format: MODIFIERS+KEY = ACTION [ARG]
Modifiers: WIN, CTRL, ALT, SHIFT (combine with +)
Actions: SWITCH &lt;N&gt;   - Switch to virtual desktop N
MOVE &lt;N&gt;     - Move foreground window to desktop N
MOVE_SWITCH &lt;N&gt; - Move window AND switch to desktop N
SIMULATE_KEY[MODIFIERS+KEY] - Simulate keys
RUN["app path", "arguments"] - Allows you to run an app using a shortcut with custom args</code></pre>
            <p>This is also given in the *.conf* for any time reference.</p>

            <h2>Using the pre-existing functions</h2>
            <p>When you open the *.conf*, you will see three implemented functions, but DISABLED.</p>
            <pre><code>Virtual_Desktop_Switch=Disabled
New_Desktop_Creation=Disabled
Auto_Remove_Virtual_Desktop=Disabled</code></pre>
            <p>Well, these are for YOU to enable, it is completely your choice. No stress.</p>
            <p>Well if you enable, and see the next few lines, you will notice this:</p>
            <pre><code>WIN+1 = SWITCH 1
WIN+2 = SWITCH 2
WIN+3 = SWITCH 3
WIN+4 = SWITCH 4
WIN+5 = SWITCH 5
WIN+6 = SWITCH 6
WIN+7 = SWITCH 7
WIN+8 = SWITCH 8
WIN+9 = SWITCH 9</code></pre>
            <p>This is the key for switching from one virtual desktop to another.</p>
            <p>You can edit it, keeping in mind the Important Notes to not conflict with the OS.</p>
            <p>You will also see this when you scroll down:</p>
            <pre><code>Window_And_Virtual_Desktop_Switch=Disabled</code></pre>
            <p>Enable this to have Window+Desktop Switch at the same time(keep reading to check the explanation out{if you didn't understand}).</p>
            <p>Here are the list of keybinds you will see on the screen:</p>
            <pre><code>WIN+SHIFT+1 = MOVE_SWITCH 1
WIN+SHIFT+2 = MOVE_SWITCH 2
WIN+SHIFT+3 = MOVE_SWITCH 3
WIN+SHIFT+4 = MOVE_SWITCH 4
WIN+SHIFT+5 = MOVE_SWITCH 5
WIN+SHIFT+6 = MOVE_SWITCH 6
WIN+SHIFT+7 = MOVE_SWITCH 7
WIN+SHIFT+8 = MOVE_SWITCH 8
WIN+SHIFT+9 = MOVE_SWITCH 9</code></pre>
            <p>This is to MOVE the window WITH moving the Virtual Desktop.</p>
            <p>Imagine, you are on VD2, and you want to switch the window to VD3, and go to VD3 at the same time. Now the shortcut would make sense to you!</p>
            <p>You can edit these at your wish, like from WIN+SHIFT+2, you can edit to, WIN+CTRL+2, etc.</p>

            <h2>Making your own keybinds</h2>
            <p>I think it would be your most favorite section over here, making your own keybinds!</p>
            <p>An example has been commented, to illustrate how to use the keybinds:</p>
            <pre><code>CTRL+SHIFT+V = SIMULATE_KEY[CTRL+V]</code></pre>
            <p>Well, this examle shows you to add your own keybind for doing another key simulation.</p>
            <p>Lets say, your a linux user. You keep doing <kbd>CTRL+SHIFT+V</kbd>, instead of <kbd>CTRL+V</kbd>. You want, whenever <kbd>CTRL+SHIFT+V</kbd> is pressed, the command actually simulates to the system to believe that you presses <kbd>CTRL+V</kbd>.</p>
            <blockquote>
                Some keys you simulate, like <kbd>CTRL+SHIFT+V</kbd> are maybe taken by an Application and the app would not allow you to send <kbd>CTRL+SHIFT+V</kbd> to the app. It will only send <kbd>CTRL+V</kbd>(There is a workaround this problem, disable the app temorarly using a custom shortcut and start it back again when needed or just remove the simulation).
            </blockquote>
            <p>There is one more too!</p>
            <p>Wouldn't it be nice to start APPLICATIONS by mere shortcuts? Or run .bat scripts? That's what I thought and created this example:</p>
            <pre><code>CTRL+SHIFT+P = RUN('vscode.exe', '--safe-mode')</code></pre>
            <p>This allows you to run apps OR batch scripts with ARGUMENTS and with CUSTOM shortcuts. Sometimes, even I wonder how good can the application be! It is LOVELY to have this kind of feature! It saves me time too everyday!</p>

            <h2>Loading other *.conf* files with a shortcut</h2>
            <p>Yes, you can now load *.conf* files. There is a file called <em>base.conf</em>. All of the features are disabled for now, but you can modify the file to what you want and then save it as <em>gaming.conf</em> or <em>focus.conf</em> and then use shortcuts to run it.</p>
            <p>Still didn't understand?</p>
            <p>Let me show you a example - <br>
            <code>CTRL + SHIFT + W = LoadConf["gaming.conf"]</code> <br><br>
            Now this would load the custom configuration <em>gaming.conf</em> when you press <kbd> CTRL + SHIFT + W</kbd>.
            <br>
            It is <b>that <em>simple</em></b>.</p>
            <p>Now it is time for another cool feature! Transparency to the Windows, with adjustable opacity!</p>
            <div align="right"><a href="#" onclick="navigate('transparency')">Next -> Transparency.md</a></div>
        `,

        transparency: `
            <h1>Make Windows Transparent!</h1>
            <p>Yes, make your windows transparent! Don't let it be a block of ice. In WinBind, you would find it really easy to configure transparency. It is just 3 edits (max) away.</p>

            <h2>Learning the functions</h2>
            <pre><code>Actions:
Transparency = Enable/Disable
Transparency_Delay = Time_Delay(preferably in s)
Opacity = Percent_Value(include %)</code></pre>
            <p>This is already given in the *.conf* file for anytime reference.</p>

            <h2>How to enable transparency</h2>
            <p>Just change:
            <code>Transparency = Disabled</code> to <code>Transparency = Enabled</code>.</p>
            <p>This will allow the program to set up transparency for windows.</p>
            <p>But wait. You have forgot to set the transparency!</p>
            <p>If you don't, then the windows will stay 100% opaque.</p>
            <p>Lets learn how to enable.</p>

            <h2>How to change opacity</h2>
            <p>Just change:
            <code>Opacity = 100%</code> to <code>Opacity = (whatever percentage)%</code>. That's it.</p>

            <h2>Change the delay time</h2>
            <p>Delay time is what you can say <em>refresh rate</em>. It is the time when the program makes a delay before eyeing all windows and applying the style.
            More the delay, lesser the consumption of CPU and RAM.</p>
            <p>The default is:
            <code>Transparency_Delay = 1s</code></p>
            <p>Feel free to edit and change it to a higher value or a lower value.</p>

            <h2>Exclusions</h2>
            <p>Let's say you have a game. You don't want to make it transparent. You can add this to the exclusion list: thoughtfully designed to solve this major problem.</p>
            <p>For now, default is:
            <code>TransparencyExclusion = ["explorer.exe", "ShellHost.exe"]</code></p>
            <p>Feel free to remove or add.</p>
            <hr>
            <p>There are more suprises yet to come! We will now see WindowStyler to style windows to your preference. Exciting right? Keep up with the documentation!</p>
            <div align="right"><a href="#" onclick="navigate('window-styler')">Next -> WindowStyler.md</a></div>
        `,

        'window-styler': `
            <h1>Window Styler</h1>
            <p>You work with various kinds of windows, everyday.
            A window is basically the browser you view this content on. Any app that is not hidden and visible on the desktop is a window.</p>
            <p>Unfortunately, this app is not a window 🤣. It silently runs in the background. However, it can style your other windows.</p>

            <h2>Learning the functions</h2>
            <p>Here are some actions for customizing the window:</p>
            <pre><code>StealFocus = Enabled/Disabled (hover = auto-focus, like Linux)

ChangeBorderColor = [R,G,B]  (0-255 each, e.g. [255,0,0] = red)

ChangeTitleBarColor = [R,G,B] (0-255 each)

DarkModeTitleBar = Enabled/Disabled

SystemBackdrop = 1/2/3/4  (1=Auto, 2=None, 3=Mica, 4=Acrylic)

WindowStyler_Delay = Time (e.g. 2s, 1000ms, 3000)</code></pre>

            <h2>Enabling the StealFocus</h2>
            <p>What is StealFocus? Why to use them at all? This are the questions I would be asked by you.</p>
            <p>Actually, it is very simple. Imagine you have 2 windows, stacked split screen. Now you work on App1 and suddenly change to App2. Now the OS would require you to click App2 before it emerging in focus. This will allow you to activate a window WITHOUT clicking, much like Linux.</p>
            <p>You would want to use this if you keep changing the location of the cursor from one window to other, and don't want to waste the time in clicking.</p>
            <p>Here is how to enable: <pre><code>StealFocus = Enabled</code></pre></p>
            <p>That's it.</p>

            <h2>Changing the border color</h2>
            <p>Border is the grey line that runs at the sides and corners of your window, whenever it floats(not maximized).</p>
            <p>The color is a RGB value(hope you know that).</p>
            <p>Use: <kbd>ChangeBorderColor = [0,100,255]</kbd> to change the color.</p>
            <p>The actual implementation is: <kbd>ChangeBorderColor = [R,G,B]</kbd>. Feel free to use this site <a href="https://rgbcolorpicker.com/" target="_blank">https://rgbcolorpicker.com/</a> so that you can easily pick the color, with having the translated values.</p>
            <p>Set an exclusion to an application you don't want to have the border color.</p>
            <p>Use: <kbd>ChangeBorderColorExclusion = []</kbd> (Hint: Remmber the translucentcy Exclusion? Use the same concept.)</p>

            <h2>Changing the title bar color</h2>
            <p>I think everyone knows what a title bar is.</p>
            <p>Use: <kbd>ChangeTitleBarColor = [50,50,50]</kbd></p>
            <p>Again the values have to be in RGB, the same site can be referred.</p>
            <p>Again for exclusion use: <kbd>ChangeTitleBarColorExclusion = []</kbd></p>

            <h2>Dark Mode Title Bar</h2>
            <p>Changes the title bar of apps to dark black. Ex: Many app popups are often coded in Win32, so it changes their title bar white text and dark bar.</p>
            <p>Use: <kbd>DarkModeTitleBar = Enabled</kbd></p>
            <p>Again use <kbd>ChangeDarkModeTitleBarExclusion = []</kbd> for exclusions.</p>

            <h2>Changing the system backdrop</h2>
            <p>Sometimes the application can make all eligible apps change their title bar/window to a system backdrop.</p>
            <p>1 = Auto (let Windows decide) - Usually this will not give the desired result. Windows doesn't do anything much here.</p>
            <p>2 = None - Have NO systembackdrop</p>
            <p>3 = Mica - For having slight blur effect known as mica.</p>
            <p>4 = Acrylic - More solid than mica. Useful in some cases</p>
            <p>Set it up like: <kbd>SystemBackdrop = 3</kbd></p>
            <p>To exclude an app use: <kbd>SystemBackdropExclusion = []</kbd></p>

            <h2>Delay time</h2>
            <p>Like Translucentcy program, you have an option to set how much delay you want. Lesser the delay, lesser the time the application takes to style the window.</p>
            <p>Use: <kbd>WindowStyler_Delay = 500ms</kbd></p>
            <hr>
            <p>I am sure, if you paid close attention, your windows would look better then anyone else's. Anyway, we are still on the trip. It's not over. The best features are yet to come. Want to set up a soft music in the background? Don't worry, I have got you covered! Keep reading!</p>
            <div align="right"><a href="#" onclick="navigate('dev-overview')">Next -> BackgroundMusic.md</a></div>
        `,

        'dev-overview': `
            <h1>WinBind — Complete Developer Guide</h1>
            <blockquote><strong>Who is this for?</strong> Anyone who wants to understand, modify, or extend WinBind. Every function, every variable, every trick.</blockquote>
            <hr>

            <h2>1. Project Overview</h2>
            <p>WinBind is a <strong>Windows utility</strong> that runs in the background. It:</p>
            <ul>
                <li>Listens for <strong>keyboard shortcuts</strong> (like <kbd>WIN+1</kbd>, <kbd>CTRL+SHIFT+C</kbd>)</li>
                <li>When you press a shortcut, it does something:
                    <ul>
                        <li><strong>Switches</strong> to a different virtual desktop</li>
                        <li><strong>Moves</strong> the current window to another desktop</li>
                        <li><strong>Simulates</strong> a different keypress (like making <kbd>CTRL+SHIFT+V</kbd> act as <kbd>CTRL+V</kbd>)</li>
                    </ul>
                </li>
                <li>Also applies <strong>window transparency</strong> (makes windows see-through) at a set interval</li>
            </ul>
            <p>It uses <strong>NO admin rights</strong>. Everything is done with user-mode Windows APIs.</p>
            <hr>
        `,

        'dev-files': `

                <tr><td><code>keybinder.h</code></td><td>The <strong>table of contents</strong>. Tells what classes, functions, and variables exist.</td></tr>

        'dev-entrypoint': `
            <h1>3. How WinBind Starts (Entry Point)</h1>
            <p><strong>File:</strong> <code>main.cpp:25</code> — Function: <code>WinMain</code></p>
            <p>Every Windows program starts at <code>WinMain</code>. Think of it as <code>main()</code> in other languages.</p>

            <h3>Step-by-step:</h3>
            <pre><code>int WINAPI WinMain(HINSTANCE hInst, HINSTANCE, LPSTR, int) {</code></pre>
            <p><code>HINSTANCE hInst</code> — a handle to the program itself. Windows gives it to you, you pass it along.</p>
            <pre><code>Keybinder& kb = Keybinder::Instance();</code></pre>
            <p>Gets the <strong>single, one-and-only</strong> Keybinder object. This is called a <strong>singleton</strong> — there can only ever be one.</p>
            <pre><code>const char* configPath = "winbind.conf";
const char* cmdLine = GetCommandLineA();
const char* flag = strstr(cmdLine, "--config");
if (flag) {
    const char* val = flag + 8;
    while (*val == ' ' || *val == '=') val++;
    if (*val) configPath = val;
}</code></pre>
            <p>This checks if the user ran WinBind with a custom config path:</p>
            <pre><code>WinBind.exe --config "C:\\my_settings.conf"</code></pre>
            <p>If they didn't, it uses <code>winbind.conf</code> in the current folder.</p>
            <pre><code>kb.LoadConfig(configPath);</code></pre>
            <p>Reads the config file and remembers all the keybinds.</p>
            <pre><code>WNDCLASSEXW wc = { sizeof(wc) };
wc.lpfnWndProc = WndProc;        // Window's "brain" — handles messages
wc.hInstance = hInst;
wc.lpszClassName = L"KeybinderHiddenWnd";
RegisterClassExW(&wc);

HWND hWnd = CreateWindowExW(0, L"KeybinderHiddenWnd", L"", 0, 0, 0, 0, 0,
    HWND_MESSAGE, NULL, hInst, NULL);</code></pre>
            <p>This creates a <strong>hidden window</strong> — it doesn't appear on your screen or taskbar. It's just a mailbox for messages.</p>
            <p><code>HWND_MESSAGE</code> is the magic flag that makes it invisible.</p>
            <pre><code>kb.SetWindowHandle(hWnd);</code></pre>
            <p>Tells the Keybinder: "Here is the mailbox. Post messages here."</p>
            <pre><code>if (!kb.Init()) return 1;</code></pre>
            <p>Sets up the keyboard hook (starts listening) and COM (talks to Windows desktop APIs).</p>
            <pre><code>int delayMs = LoadTransparencyDelayMs();
SetTimer(hWnd, TIMER_TRANSPARENCY, delayMs, NULL);</code></pre>
            <p>Starts a timer. Every <code>delayMs</code> milliseconds (1000ms = 1 second by default), the window gets a "time to apply transparency" message.</p>
            <pre><code>MSG msg;
while (GetMessage(&msg, NULL, 0, 0)) {
    TranslateMessage(&msg);
    DispatchMessage(&msg);
}</code></pre>

        'dev-com': `
            <h1>13. COM &amp; The SIGSEGV Guard</h1>
            <h3>What is COM?</h3>
            <p>COM (Component Object Model) is Windows' way of letting programs talk to each other. WinBind uses COM to:
            <ul>
                <li>Ask "which desktop is this window on?"</li>
                <li>Move windows between desktops</li>
                <li>Delete empty desktops</li>
            </ul></p>

            <h3>The DocString Approach</h3>
            <p>Define the vtable for <code>IVirtualDesktopManager</code> manually:</p>
            <pre><code>struct IVirtualDesktopManagerVT {
    HRESULT (*QueryInterface)(void*, REFIID, void**);
    ULONG   (*AddRef)(void*);
    ULONG   (*Release)(void*);
    HRESULT (*IsWindowOnCurrentVirtualDesktop)(void*, HWND, BOOL*);
    HRESULT (*GetWindowDesktopId)(void*, HWND, GUID*);
    HRESULT (*MoveWindowToDesktop)(void*, HWND, REFGUID);
};</code></pre>

            <h3>The SIGSEGV Guard</h3>
            <p><strong>File:</strong> <code>keybinder.cpp:64-72, 101-158</code></p>
            <p>Since the undocumented COM interfaces change between Windows versions, calling the wrong vtable index = instant crash. WinBind uses a <strong>signal handler</strong> to catch crashes:</p>
            <pre><code>static jmp_buf g_comJmpBuf;

extern "C" void __cdecl SigSegvHandler(int) {
    longjmp(g_comJmpBuf, 1);
}</code></pre>
            <p>Usage pattern:</p>
            <pre><code>void (*oldHandler)(int) = signal(SIGSEGV, SigSegvHandler);

if (setjmp(g_comJmpBuf) == 0) {
    // Try the COM call
} else {
    // Crash was caught. Handle gracefully.
}

signal(SIGSEGV, oldHandler);</code></pre>
            <p>This is <strong>extremely unusual</strong> in C++ — most programs would just crash. But it lets WinBind try 5 different COM interface IDs and silently skip the ones that don't work.</p>
            <hr>

            <h2>14. The <code>ComPtr</code> Template</h2>
            <p><strong>File:</strong> <code>keybinder.h:28-42</code></p>
            <pre><code>template&lt;typename T&gt;
class ComPtr {
    T* p;
public:
    ComPtr() : p(nullptr) {}
    explicit ComPtr(T* ptr) : p(ptr) {}
    ~ComPtr() { if (p) p->Release(); }
    T** operator&() { return &p; }
    T* operator->() { return p; }
    operator T*() const { return p; }
    T* Get() const { return p; }
    void Reset() { if (p) { p->Release(); p = nullptr; } }
};</code></pre>
            <p><strong>But note:</strong> This <code>ComPtr</code> is barely used in the actual code! Most COM calls use raw pointers and manual <code>Release()</code>. This is an unfinished abstraction. You could improve the code by using <code>ComPtr</code> everywhere.</p>
            <hr>

            <h2>15. Modifier Tracking</h2>
            <p><strong>File:</strong> <code>keybinder.cpp:614-621</code></p>
            <p>WinBind keeps a real-time record of which modifier keys are held:</p>
            <pre><code>DWORD mb = 0;
switch (vk) {
    case VK_LWIN: case VK_RWIN:   mb = MODB_WIN;   break;
    case VK_LCONTROL: case VK_RCONTROL: mb = MODB_CTRL; break;
    case VK_LMENU: case VK_RMENU: mb = MODB_ALT;   break;
    case VK_LSHIFT: case VK_RSHIFT: mb = MODB_SHIFT; break;
}
if (mb) {
    m_modsTracked = down ? (m_modsTracked | mb) : (m_modsTracked & ~mb);
    return 0;
}</code></pre>
            <p><strong>Why not use <code>GetAsyncKeyState</code>?</strong> On modern Windows, <code>GetAsyncKeyState</code> can miss modifier state changes when the hook is processing keys. Tracking from the hook events is more reliable.</p>

            <h3>The Bitmask</h3>
            <table>
                <tr><th>Bit</th><th>Value</th><th>Constant</th><th>Key</th></tr>
                <tr><td>0</td><td>0x01</td><td><code>MODB_WIN</code></td><td>Windows key</td></tr>
                <tr><td>1</td><td>0x02</td><td><code>MODB_CTRL</code></td><td>Ctrl</td></tr>
                <tr><td>2</td><td>0x04</td><td><code>MODB_ALT</code></td><td>Alt</td></tr>
                <tr><td>3</td><td>0x08</td><td><code>MODB_SHIFT</code></td><td>Shift</td></tr>
            </table>
            <hr>

            <h2>16. The <code>m_busy</code> / <code>m_simulating</code> Guards</h2>
            <h3><code>m_busy</code> — Prevents Re-entrant Execution</h3>
            <pre><code>void Keybinder::ExecuteQueuedAction(int bindingIndex) {
    if (m_busy) return;
    m_busy = true;
    ExecuteAction(m_bindings[bindingIndex]);
    m_busy = false;
}</code></pre>
            <h3><code>m_simulating</code> — Prevents Infinite Loops</h3>
            <pre><code>void Keybinder::SimulateKeyCombo(DWORD mods, DWORD vk) {
    m_simulating = true;
    SendInput(...);
    m_simulating = false;
}</code></pre>
            <p><strong>Why Two Guards?</strong></p>
            <ul>
                <li><code>m_busy</code> is for when code is actively executing (switching desktops, moving windows)</li>
                <li><code>m_simulating</code> is specifically for the <code>SendInput</code> injection window (which happens within <code>m_busy</code>)</li>
            </ul>
            <hr>
        `,

        'dev-adding': `
            <h1>17. The <code>RUN</code> Action — Launch Apps from Keybinds</h1>
            <h3>What it does</h3>
            <pre><code>CTRL+SHIFT+P = RUN("notepad.exe", "C:\\log.txt")</code></pre>

            <h3>How it's implemented</h3>
            <p>The <code>RUN</code> action touches <strong>4 places</strong> in the code:</p>
            <h4>1. The <code>Keybinding</code> struct stores the app + args</h4>
            <pre><code>struct Keybinding {
    std::string runApp;
    std::string runArgs;
};</code></pre>

            <h4>2. Config parsing extracts the expression</h4>
            <pre><code>if (act.find("RUN(") == 0 && act.back() == ')') {
    std::string inner = act.substr(4, act.size() - 5);
    size_t comma = inner.find(',');
    if (comma != std::string::npos) {
        runApp = Trim(inner.substr(0, comma));
        runArgs = Trim(inner.substr(comma + 1));
    } else {
        runApp = Trim(inner);
    }
    if (runApp.size() >= 2 && runApp[0] == '"' && runApp.back() == '"')
        runApp = runApp.substr(1, runApp.size() - 2);
    if (runArgs.size() >= 2 && runArgs[0] == '"' && runArgs.back() == '"')
        runArgs = runArgs.substr(1, runArgs.size() - 2);
    act = "RUN";
}</code></pre>

            <h4>3. Action dispatch launches the process</h4>
            <pre><code>else if (kb.action == "RUN") {
    ShellExecuteA(NULL, "open", kb.runApp.c_str(),
        kb.runArgs.empty() ? NULL : kb.runArgs.c_str(),
        NULL, SW_SHOWNORMAL);
}</code></pre>

            <h3>Example config lines</h3>
            <pre><code>CTRL+SHIFT+P = RUN("notepad.exe", "")          # No args
CTRL+SHIFT+O = RUN("C:\\Program Files\\MyApp\\app.exe", "--safe-mode")
WIN+B = RUN("cmd.exe", "/c echo hello")
CTRL+ALT+T = RUN("ms-settings:")</code></pre>

            <hr>

            <h2>18. How to Add a New Config Option</h2>
            <h3>Step 1: Add a member variable</h3>
            <pre><code>bool m_launchAtStartup;</code></pre>
            <h3>Step 2: Parse it in <code>LoadConfig</code></h3>
            <pre><code>if (lhs == "Launch_At_Startup") { parseBool(m_launchAtStartup); continue; }</code></pre>
            <h3>Step 3: Use it somewhere</h3>
            <hr>

            <h2>19. How to Make Something Run Once vs Every Time</h2>
            <table>
                <tr><th>Pattern</th><th>Runs When</th><th>Example</th></tr>
                <tr><td>Keybind action</td><td>When keybind pressed</td><td>Switching desktop</td></tr>
                <tr><td>Program start</td><td>Once at launch</td><td>Loading config</td></tr>
                <tr><td>Every keystroke</td><td>Each keypress</td><td>Checking config changes</td></tr>
                <tr><td>Timer</td><td>Every N ms</td><td>Applying transparency</td></tr>
            </table>
            <hr>
        `,

        'dev-build': `

        'dev-pitfalls': `
            <h1>21. Common Pitfalls</h1>

            <h3>Pitfall 1: WIN+ALT+NUMBER doesn't work</h3>
            <p><strong>Why:</strong> Windows 11 reserves <kbd>WIN+ALT+NUMBER</kbd> (taskbar jump lists) and <kbd>WIN+SHIFT+NUMBER</kbd> (new instance). No user-mode hook can intercept these.</p>
            <p><strong>Fix:</strong> Use <kbd>WIN+CTRL+NUMBER</kbd> or other non-reserved combos.</p>

            <h3>Pitfall 2: Config changes don't take effect</h3>
            <p><strong>Why:</strong> <code>CheckConfigChanged</code> compares file modification timestamps. Some editors (like Notepad) create a new file on save, which changes the timestamp. But if you edit the file while WinBind isn't running, the timestamp is already newer when WinBind starts — so it loads it once and doesn't detect changes until you save again.</p>
            <p><strong>Fix:</strong> Save the file again after WinBind starts. Or restart WinBind.</p>

            <h3>Pitfall 3: Simulated keys don't reach the target app</h3>
            <p><strong>Why:</strong> Some apps (especially games, terminals, and admin apps) use <code>GetAsyncKeyState</code> or raw input instead of the keyboard message queue. <code>SendInput</code> injects into the message queue — it won't reach apps that bypass the queue.</p>
            <p><strong>Fix:</strong> There's no universal fix. Try <kbd>WIN+SHIFT+ARROW</kbd> (attempt 3 in <code>MoveCurrentWindowToDesktop</code>) as a fallback, or run WinBind as admin (though this is not recommended).</p>

            <h3>Pitfall 4: Crash on COM calls</h3>
            <p><strong>Why:</strong> The undocumented <code>IVirtualDesktopManagerInternal</code> interface changes with every Windows update. If the vtable index for <code>MoveViewToDesktop</code>, <code>FindDesktop</code>, or <code>RemoveDesktop</code> changed, the SIGSEGV guard catches it, but the operation fails.</p>
            <p><strong>Fix:</strong> Check if there's a new IID for your Windows version and add it to the <code>pairs[]</code> array in <code>TryMoveWindowViaService</code> and <code>RemoveEmptyDesktops</code>.</p>

            <h3>Pitfall 5: <code>SendInput</code> doesn't work inside the hook</h3>
            <p><strong>Why:</strong> Windows has a restriction: <code>SendInput</code> called from within a low-level keyboard hook callback may not work correctly. That's why WinBind <strong>posts a message</strong> to the hidden window and executes actions in the message loop instead.</p>

            <h3>Pitfall 6: Infinite loop (binding triggers itself)</h3>
            <p>If you bind <code>WIN+1 = SIMULATE_KEY[WIN+1]</code>, pressing <kbd>WIN+1</kbd> will:
            <ol>
                <li>Hook catches <kbd>WIN+1</kbd></li>
                <li>Posts <code>WM_KB_EXECUTE</code></li>
                <li>Executes <code>SIMULATE_KEY[WIN+1]</code></li>
                <li>SendInput injects <kbd>WIN+1</kbd></li>
                <li>Hook catches injected <kbd>WIN+1</kbd></li>
                <li>Goes to step 2 — forever</li>
            </ol></p>
            <p><strong>The fix:</strong> <code>m_simulating</code> guard prevents injected keys from matching bindings. But only during the 20ms message pump window. If the timing is unlucky, you can still get loops. Don't bind a key to simulate itself.</p>
            <hr>

            <p><em>Happy coding! Remember: every expert was once a beginner who didn't give up.</em></p>
        `,
    };

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        let html = '';
        for (const section of SIDEBAR) {
            html += '<div class="sidebar-section">';
            html += `<div class="sidebar-section-title" onclick="toggleSection(this)">
                ${section.title} <span class="arrow open">&#9654;</span>
            </div>`;
            html += '<div class="sidebar-items">';
            for (const item of section.items) {
                const icon = item.icon ? `<i class="ph-bold ph-${item.icon}"></i>` : '';
                html += `<div class="sidebar-item" data-id="${item.id}" onclick="navigate('${item.id}')">
                    ${icon} ${item.label}
                </div>`;
                if (item.subitems) {
                    for (const sub of item.subitems) {
                        html += `<div class="sidebar-subitem" data-id="${sub.id}" onclick="navigate('${sub.id}')">
                            ${sub.label}
                        </div>`;
                    }
                }
            }
            html += '</div></div>';
        }
        sidebar.innerHTML = html;
        document.querySelectorAll('.sidebar-section-title .arrow').forEach(a => a.classList.add('open'));
    }

    function toggleSection(el) {
        const arrow = el.querySelector('.arrow');
        const items = el.nextElementSibling;
        const isOpen = arrow.classList.contains('open');
        if (isOpen) {
            arrow.classList.remove('open');
            items.style.maxHeight = '0';
            items.style.opacity = '0';
        } else {
            arrow.classList.add('open');
            items.style.maxHeight = items.scrollHeight + 'px';
            items.style.opacity = '1';
        }
    }

    function navigate(id) {
        document.querySelectorAll('.sidebar-item, .sidebar-subitem').forEach(el => el.classList.remove('active'));
        const activeEl = document.querySelector(`[data-id="${id}"]`);
        if (activeEl) activeEl.classList.add('active');

        const container = document.getElementById('docContent');
        const content = CONTENT[id];
        if (content) {
            container.innerHTML = content;
        } else {
            container.innerHTML = `<h1>${id}</h1><p>Content coming soon.</p>`;
        }
        container.scrollTop = 0;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderSidebar();
    navigate('welcome');
    </script>
</body>
</html>
